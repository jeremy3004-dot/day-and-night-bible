<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EveryBible App Capture</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(139, 38, 53, 0.28), transparent 38%),
          linear-gradient(180deg, #151618 0%, #0d0e10 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 48px 32px;
      }

      img {
        display: block;
        width: min(420px, 88vw);
        height: auto;
        border-radius: 28px;
        box-shadow:
          0 24px 90px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./screenshot.png" alt="EveryBible app screenshot" />
    </main>
  </body>
</html>
